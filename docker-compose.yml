version: '3.8'

services:
  bom-viewer:
    build: .
    container_name: bom-viewer
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Логи (опционально)
      - ./logs:/app/logs
    networks:
      - bom-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bom-network:
    driver: bridge