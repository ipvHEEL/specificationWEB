<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOM Iris Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f5f7fa; }
        header {
            background: #1f2937; color: white; padding: 12px 20px;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        header h1 { font-size: 18px; margin: 0; }
        header .subtitle { color: #cbd5e1; font-size: 13px; }
        .search-box { position: relative; flex: 1; min-width: 280px; max-width: 600px; }
        #searchInput {
            width: 100%; padding: 8px 12px; border-radius: 6px; border: none;
            font-size: 14px;
        }
        #suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; color: #111; border-radius: 0 0 6px 6px;
            box-shadow: 0 4px 12px rgba(0,0,0,.15); max-height: 320px; overflow-y: auto;
            display: none; z-index: 10;
        }
        .sugg-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
        .sugg-item:hover { background: #eef4ff; }
        .sugg-item .code { font-weight: 600; color: #1f2937; }
        .sugg-item .name { color: #6b7280; font-size: 12px; display: block; margin-top: 2px; }

        #graph { width: 100%; height: calc(100vh - 128px); background: #f8fafc; overflow: hidden; }
        .iris-svg { display: block; cursor: grab; }
        .iris-svg:active { cursor: grabbing; }
        .iris-node { cursor: pointer; }
        .flow-node polygon { transition: stroke .15s, stroke-width .15s, filter .15s; }
        .flow-node:hover polygon:first-child, .flow-node.selected polygon:first-child { stroke: #163b12; stroke-width: 4; filter: drop-shadow(6px 8px 5px rgba(15, 23, 42, .32)); }
        .flow-node text { font-size: 11px; fill: #10220d; font-weight: 800; pointer-events: none; }
        .flow-node.depth-0 text { font-size: 12px; }
        .flow-title text { fill: #475569; font-size: 13px; font-weight: 800; }

        .toolbar {
            padding: 8px 20px; background: #fff; border-bottom: 1px solid #e5e7eb;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .legend, #graphStats, .type-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; align-items: center; }
        .zoom-hint { color: #64748b; font-size: 12px; }
        #graphStats { margin-left: 0; color: #475569; font-size: 12px; }
        .type-stats { margin-left: 8px; }
        .legend span, #graphStats span {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: #374151;
        }
        .legend i, #graphStats i { width: 14px; height: 14px; border-radius: 999px; display: inline-block; }
        button {
            padding: 6px 12px; border: 1px solid #d1d5db; background: white;
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        button:hover { background: #f3f4f6; }
        #info {
            position: absolute; right: 20px; top: 140px; width: 320px;
            background: white; border-radius: 8px; padding: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,.1); font-size: 13px;
            display: none; max-height: 70vh; overflow-y: auto;
        }
        #info h3 { margin: 0 0 8px; font-size: 14px; }
        #info .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #eee; }
        #info .row b { color: #6b7280; font-weight: 500; }
        .children-list { display: grid; gap: 6px; margin-top: 10px; }
        .children-list b { color: #6b7280; font-weight: 600; }
        .children-list button { text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #loader {
            position: fixed; inset: 0; background: rgba(255,255,255,.7);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e5e7eb;
            border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>BOM Iris Viewer</h1>
    <!-- <span class="subtitle">блочная iris-схема спецификаций</span> -->
    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Введите код или название спецификации..." autocomplete="off">
        <div id="suggestions"></div>
    </div>
</header>

<div class="toolbar">
    <button id="btnFit">⤢ Показать всё</button>
    <button id="btnZoomOut">− Отдалить</button>
    <button id="btnZoomIn">+ Приблизить</button>
    <label for="VarInArt">Выберете вариант</label>
    <select name="variants" id="VarInArt">
        <option value="4">4</option>
        <option value="50">50</option>
    </select>
    <label for="VersionInArt">Выберете версию</label>
    <select name="versions" id="VersionInArt">
        <option value="1">1</option>
        <option value="2">2</option>
    </select>
    

    <span class="zoom-hint">Колесо мыши: масштаб 6–800%</span>
    <button id="btnExport">⬇ Экспорт SVG</button>
    <div id="graphStats">Выберите спецификацию для построения блочной iris-схемы</div>
    <div class="legend">
        <span><i style="background:#F44336"></i>ГП</span>
        <span><i style="background:#AB47BC"></i>ПФ</span>
        <span><i style="background:#8BC34A"></i>Сырьё</span>
        <span><i style="background:#2196F3"></i>ТМЦ</span>
        <span><i style="background:#FF9800"></i>Тара</span>
    </div>
</div>

<div id="graph"></div>
<div id="info"></div>
<div id="loader"><div class="spinner"></div></div>

<script src="/static/app.js?v=iris-flow-20260701-zoom"></script>
</body>
</html>
